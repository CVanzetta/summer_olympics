name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with ruff
        run: |
          if command -v ruff >/dev/null 2>&1; then ruff check . ; else echo 'ruff not installed'; fi
      - name: Run tests
        run: |
          if command -v pytest >/dev/null 2>&1; then pytest -q; else echo 'pytest not installed'; fi
      - name: Dry-run LookML conversion
        run: |
          python scripts/pbip_to_looker.py . ./.ci_looker || true
